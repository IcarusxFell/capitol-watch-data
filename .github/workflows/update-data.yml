name: Update disclosure data

# Security notes:
#  - Minimal permissions (only write to this repo's contents).
#  - For maximum supply-chain safety, pin the actions below to a full commit SHA
#    instead of the version tag (Dependabot is configured to manage that).

on:
  schedule:
    - cron: "17 9 * * *"   # daily, 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCR system packages
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Scrape + validate (quality gates fail the build on bad data)
        run: python -m scraper.main

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
